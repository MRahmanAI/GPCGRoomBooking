<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Health – First Floor Room Booking</title>
<style>
  :root {
    --teal: #00897b;
    --teal-light: #4db6ac;
    --teal-pale: #e0f2f1;
    --navy: #1a2e3b;
    --slate: #4a6275;
    --muted: #8fa7b5;
    --border: #dde6ea;
    --bg: #f4f7f9;
    --white: #ffffff;
    --booked: #00897b;
    --available: #e0f2f1;
    --accent: #26c6da;
    --warn: #ff7043;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP NAV ── */
  header {
    background: var(--navy);
    color: white;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 56px;
    flex-shrink: 0;
    border-bottom: 2px solid var(--teal);
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--teal-light);
    white-space: nowrap;
  }
  .logo span { color: white; }
  .header-divider { width: 1px; height: 24px; background: rgba(255,255,255,.2); }

  /* view tabs */
  .view-tabs {
    display: flex;
    background: rgba(255,255,255,.08);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
  }
  .view-tab {
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(255,255,255,.7);
    transition: all .15s;
  }
  .view-tab.active { background: var(--teal); color: white; }
  .view-tab:hover:not(.active) { background: rgba(255,255,255,.12); color: white; }

  .header-spacer { flex: 1; }

  /* date nav */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .date-nav button {
    background: rgba(255,255,255,.1);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }
  .date-nav button:hover { background: rgba(255,255,255,.2); }
  .date-label { cursor: pointer; padding: 4px 10px; border-radius: 4px; transition: background .15s; }
  .date-label:hover { background: rgba(255,255,255,.1); }

  .today-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    border: 1px solid rgba(255,255,255,.3);
    color: white;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }
  .today-btn:hover { background: rgba(255,255,255,.1); }

  .new-booking-btn {
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    background: var(--teal);
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .new-booking-btn:hover { background: var(--teal-light); }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .floor-selector {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    background: var(--bg);
    cursor: pointer;
    outline: none;
  }
  .filter-chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--slate);
    background: white;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .filter-chip.on { background: var(--teal-pale); border-color: var(--teal); color: var(--teal); }
  .filter-chip:hover { border-color: var(--teal); color: var(--teal); }
  .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .legend { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--slate); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  /* ── MAIN LAYOUT ── */
  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── VIEWS ── */
  .view { display: none; flex: 1; overflow: auto; }
  .view.active { display: flex; flex-direction: column; }

  /* ══════════════════════════════
     DAY VIEW
  ═══════════════════════════════ */
  .day-grid {
    flex: 1;
    overflow: auto;
    display: grid;
    grid-template-columns: 52px repeat(var(--room-count, 9), minmax(120px, 1fr));
  }
  .day-col-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 10px 8px 8px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    color: var(--slate);
    border-right: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .day-col-header.room-header { color: var(--navy); font-size: 12px; text-transform: none; letter-spacing: 0; }
  .time-gutter { background: var(--bg); border-right: 2px solid var(--border); }
  .time-gutter-header { position: sticky; top: 0; z-index: 11; background: var(--bg); border-bottom: 2px solid var(--border); border-right: 2px solid var(--border); }
  .time-slot { position: relative; height: 48px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  .time-slot.half { border-bottom-style: dashed; border-bottom-color: #eef1f3; }
  .time-label {
    position: sticky;
    top: 0;
    height: 48px;
    border-bottom: 1px solid var(--border);
    border-right: 2px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    padding: 4px 6px;
    background: var(--bg);
    font-weight: 500;
  }
  .booking-block {
    position: absolute;
    left: 3px; right: 3px;
    border-radius: 5px;
    padding: 4px 7px;
    font-size: 11px;
    font-weight: 600;
    overflow: hidden;
    cursor: pointer;
    z-index: 2;
    border-left: 3px solid var(--teal);
    background: var(--teal-pale);
    color: var(--teal);
    transition: box-shadow .15s;
    line-height: 1.3;
  }
  .booking-block:hover { box-shadow: 0 2px 8px rgba(0,137,123,.3); }
  .booking-block .bk-name { font-size: 10px; opacity: .8; font-weight: 400; }
  .room-col { position: relative; }

  /* ══════════════════════════════
     MONTH VIEW
  ═══════════════════════════════ */
  .month-grid {
    flex: 1;
    overflow: auto;
    padding: 16px 24px;
  }
  .month-cal {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: white;
  }
  .month-day-header {
    padding: 10px;
    background: var(--bg);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  .month-cell {
    min-height: 90px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    cursor: pointer;
    transition: background .15s;
  }
  .month-cell:nth-child(7n) { border-right: none; }
  .month-cell:hover { background: var(--teal-pale); }
  .month-cell.today { background: #fffde7; }
  .month-cell.today .mc-date { color: var(--teal); font-weight: 700; }
  .month-cell.other-month { opacity: .4; background: var(--bg); }
  .mc-date { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .mc-event {
    font-size: 10px;
    background: var(--teal-pale);
    color: var(--teal);
    border-radius: 3px;
    padding: 1px 5px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .mc-more { font-size: 10px; color: var(--teal); font-weight: 600; cursor: pointer; }

  /* ══════════════════════════════
     LIST VIEW
  ═══════════════════════════════ */
  .list-view-inner { flex: 1; overflow: auto; padding: 0 24px 24px; }
  .list-day-group { margin-top: 20px; }
  .list-day-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 8px 0 6px;
    border-bottom: 2px solid var(--teal-pale);
    margin-bottom: 4px;
  }
  .list-row {
    display: grid;
    grid-template-columns: 130px 1fr 140px 100px;
    align-items: center;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .1s;
    gap: 16px;
    font-size: 13px;
  }
  .list-row:hover { background: var(--teal-pale); }
  .list-time { font-weight: 600; color: var(--navy); font-size: 13px; }
  .list-duration { font-size: 11px; color: var(--muted); }
  .list-room { color: var(--slate); font-weight: 500; }
  .list-person { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-pill.confirmed { background: var(--teal-pale); color: var(--teal); }
  .status-pill.recurring { background: #e8f5e9; color: #388e3c; }

  /* ══════════════════════════════
     MAP VIEW
  ═══════════════════════════════ */
  .map-view-inner {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px;
    gap: 24px;
  }
  .floor-map-wrap {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    flex-shrink: 0;
  }
  .floor-map-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--slate);
    margin-bottom: 12px;
  }
  .floorplan-stage {
    position: relative;
    display: inline-block;
    line-height: 0;
    border-radius: 6px;
    overflow: hidden;
  }
  .floorplan-img {
    display: block;
    max-width: 100%;
    height: auto;
    user-select: none;
    pointer-events: none;
  }
  .floorplan-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .hotspot {
    cursor: pointer;
    fill: transparent;
    stroke: transparent;
    stroke-width: 3;
    transition: fill .15s, stroke .15s;
  }
  .hotspot:hover {
    fill: rgba(38, 198, 110, .22);
    stroke: rgba(38, 198, 110, .85);
  }
  .hotspot:focus-visible {
    fill: rgba(38, 198, 110, .25);
    stroke: #1fb673;
    outline: none;
  }
  .hotspot.taken {
    cursor: default;
  }
  .hotspot.taken:hover {
    fill: rgba(176, 190, 197, .3);
    stroke: rgba(120, 138, 148, .7);
  }
  .map-legend {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    width: 200px;
    flex-shrink: 0;
  }
  .map-legend h4 { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .map-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--slate); margin-bottom: 8px; }
  .map-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .map-dot.available { background: #4caf50; }
  .map-dot.booked { background: #b0bec5; }
  .map-dot.partial { background: var(--warn); }

  /* ══════════════════════════════
     GRID VIEW (week grid)
  ═══════════════════════════════ */
  .grid-view-inner {
    flex: 1;
    overflow: auto;
    display: grid;
    grid-template-columns: 56px repeat(7, 1fr);
  }
  .gv-header {
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
    border-bottom: 2px solid var(--border);
    padding: 8px 6px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    color: var(--slate);
    border-right: 1px solid var(--border);
  }
  .gv-header.day-head { color: var(--navy); }
  .gv-header.today-head { color: var(--teal); }
  .gv-time {
    height: 48px;
    border-bottom: 1px solid var(--border);
    border-right: 2px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    padding: 4px 6px;
    background: var(--bg);
  }
  .gv-cell {
    height: 48px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: background .1s;
  }
  .gv-cell:hover { background: var(--teal-pale); }
  .gv-booking {
    position: absolute;
    inset: 2px 2px;
    border-radius: 4px;
    background: var(--teal-pale);
    border-left: 3px solid var(--teal);
    font-size: 10px;
    color: var(--teal);
    font-weight: 600;
    padding: 2px 5px;
    overflow: hidden;
  }

  /* ══════════════════════════════
     MODAL
  ═══════════════════════════════ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,46,59,.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 17px; font-weight: 700; color: var(--navy); }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 0 4px; }
  .modal-close:hover { color: var(--navy); }
  .modal-body { padding: 20px 24px; }
  .form-row { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--slate); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    color: var(--navy);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
    font-family: var(--font);
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--teal); background: white; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .btn { padding: 9px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--slate); }
  .btn-ghost:hover { border-color: var(--slate); color: var(--navy); }
  .btn-primary { background: var(--teal); color: white; }
  .btn-primary:hover { background: var(--teal-light); }
  .btn-danger { background: #fff0ed; color: var(--warn); border: 1px solid #ffccbc; }
  .btn-danger:hover { background: #ffccbc; }

  /* tooltip on map */
  .room-tooltip {
    position: fixed;
    background: var(--navy);
    color: white;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 200;
    display: none;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }

  /* notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--teal);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,137,123,.4);
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }
  .empty-state .es-icon { font-size: 36px; margin-bottom: 12px; }

  @media (max-width: 640px) {
    .toolbar { flex-wrap: wrap; }
    .date-label { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>Island Health</span> · First Floor</div>
  <div class="header-divider"></div>
  <div class="view-tabs">
    <button class="view-tab" onclick="switchView('day')">Day</button>
    <button class="view-tab" onclick="switchView('month')">Month</button>
    <button class="view-tab" onclick="switchView('grid')">Grid</button>
    <button class="view-tab" onclick="switchView('list')">List</button>
    <button class="view-tab" onclick="switchView('map')">Map</button>
  </div>
  <div class="header-spacer"></div>
  <div class="date-nav">
    <button onclick="navDate(-1)">‹</button>
    <div class="date-label" id="dateLabel" onclick="goToToday()"></div>
    <button onclick="navDate(1)">›</button>
  </div>
  <button class="today-btn" onclick="goToToday()">Today</button>
  <div class="header-divider"></div>
  <button class="new-booking-btn" onclick="openNewBooking()">+ New Booking</button>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <select class="floor-selector">
    <option>Island Health First Floor</option>
    <option>Ground Floor</option>
    <option>Second Floor</option>
  </select>
  <button class="filter-chip on" onclick="this.classList.toggle('on')">All Rooms</button>
  <button class="filter-chip" onclick="this.classList.toggle('on')">Meeting Rooms</button>
  <button class="filter-chip" onclick="this.classList.toggle('on')">Hot Desking</button>
  <button class="filter-chip" onclick="this.classList.toggle('on')">Board Rooms</button>
  <button class="filter-chip" onclick="this.classList.toggle('on')">Available Now</button>
  <div class="toolbar-right">
    <div class="legend">
      <span><span class="legend-dot" style="background:#4caf50"></span> Available</span>
      <span><span class="legend-dot" style="background:var(--teal)"></span> Booked</span>
      <span><span class="legend-dot" style="background:var(--warn)"></span> Partial</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- ── DAY VIEW ── -->
  <div class="view" id="view-day">
    <div class="day-grid" id="dayGrid" style="--room-count:9"></div>
  </div>

  <!-- ── MONTH VIEW ── -->
  <div class="view" id="view-month">
    <div class="month-grid">
      <div class="month-cal" id="monthCal"></div>
    </div>
  </div>

  <!-- ── GRID VIEW ── -->
  <div class="view" id="view-grid">
    <div class="grid-view-inner" id="gridView"></div>
  </div>

  <!-- ── LIST VIEW ── -->
  <div class="view" id="view-list">
    <div class="list-view-inner" id="listView"></div>
  </div>

  <!-- ── MAP VIEW ── -->
  <div class="view" id="view-map">
    <div class="map-view-inner">
      <div class="floor-map-wrap">
        <div class="floor-map-title">Island Health · First Floor</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Booking</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Room / Space</label>
        <select class="form-select" id="bkRoom">
          <option value="">Select a room…</option>
          <option>Shipwright Board Room</option>
          <option>Corporate Hot Desking</option>
          <option>Corporate Hot Desking 2</option>
          <option>Waterside Room</option>
          <option>Small Meeting Room</option>
          <option>Docker's Hotdesking Room</option>
          <option>0-19 Office – Desk 1</option>
          <option>0-19 Office – Desk 2</option>
          <option>0-19 Office – Desk 3</option>
          <option>SPA Offices</option>
          <option>Senior Management / Exec</option>
          <option>CPLN Room</option>
          <option>Wellbeing Room</option>
          <option>IT Office</option>
          <option>IH Sweet Maker's Room</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="bkDate"/>
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0">
          <label class="form-label">Start Time</label>
          <input class="form-input" type="time" id="bkStart" value="09:00"/>
        </div>
        <div class="form-row" style="margin:0">
          <label class="form-label">End Time</label>
          <input class="form-input" type="time" id="bkEnd" value="17:00"/>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Booked by</label>
        <input class="form-input" type="text" id="bkUser" placeholder="Name or staff ID…"/>
      </div>
      <div class="form-row">
        <label class="form-label">Purpose / Notes</label>
        <textarea class="form-textarea" id="bkNotes" rows="2" placeholder="Optional…"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Recurring?</label>
        <select class="form-select" id="bkRecurring">
          <option value="none">No – one-off</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBooking()">Confirm Booking</button>
    </div>
  </div>
</div>

  'SPA Offices','Senior Management / Exec','CPLN Room',
  'Wellbeing Room','IT Office',"IH Sweet Maker's Room"
];

// Seed some demo bookings
let bookings = [
  { id:1, room:'Shipwright Board Room', date:'2026-06-18', start:'09:00', end:'16:00', user:'User booking', notes:'' },
  { id:2, room:'Corporate Hot Desking', date:'2026-06-18', start:'08:00', end:'17:00', user:'User booking', notes:'' },
  { id:3, room:'Shipwright Board Room', date:'2026-06-22', start:'08:30', end:'17:00', user:'User booking', notes:'' },
  { id:4, room:'Small Meeting Room',    date:'2026-06-22', start:'09:00', end:'17:00', user:'User booking', notes:'' },
  { id:5, room:'Waterside Room',        date:'2026-06-23', start:'07:00', end:'18:00', user:'User booking', notes:'' },
  { id:6, room:'Small Meeting Room',    date:'2026-06-23', start:'08:00', end:'13:00', user:'User booking', notes:'' },
  { id:7, room:'Shipwright Board Room', date:'2026-06-23', start:'09:00', end:'12:30', user:'User booking', notes:'' },
  { id:8, room:'Shipwright Board Room', date:'2026-06-23', start:'13:30', end:'15:30', user:'User booking', notes:'' },
  { id:9, room:'Waterside Room',        date:'2026-06-24', start:'09:00', end:'13:00', user:'User booking', notes:'' },
  { id:10,room:'Shipwright Board Room', date:'2026-06-24', start:'09:00', end:'10:30', user:'User booking', notes:'' },
  { id:11,room:'Shipwright Board Room', date:'2026-06-24', start:'10:30', end:'13:30', user:'User booking', notes:'' },
  { id:12,room:'Corporate Hot Desking', date:'2026-06-25', start:'08:00', end:'17:00', user:'User booking', notes:'' },
  { id:13,room:'Waterside Room',        date:'2026-06-25', start:'09:00', end:'13:30', user:'User booking', notes:'' },
  { id:14,room:'Small Meeting Room',    date:'2026-06-25', start:'09:00', end:'17:00', user:'User booking', notes:'' },
  { id:15,room:'Shipwright Board Room', date:'2026-06-25', start:'12:30', end:'16:00', user:'User booking', notes:'' },
  { id:16,room:'Waterside Room',        date:'2026-06-25', start:'14:00', end:'16:00', user:'User booking', notes:'' },
];

let nextId = 20;
let currentView = 'day';
let currentDate = new Date(2026, 5, 18); // 18 June 2026
let selectedMapRoom = null;

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
const fmtDate = d => d.toISOString().split('T')[0];
const fmtDayLabel = d => d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).toUpperCase();
const fmtMonthLabel = d => d.toLocaleDateString('en-GB', { month:'long', year:'numeric' }).toUpperCase();
const fmtWeekday = d => d.toLocaleDateString('en-GB', { weekday:'short' }).toUpperCase();
const fmtDayNum = d => d.getDate();
const timeToMins = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
const minsToTime = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const getDayBookings = (dateStr) => bookings.filter(b => b.date === dateStr);

function updateDateLabel() {
  const el = document.getElementById('dateLabel');
  if (currentView === 'month') el.textContent = fmtMonthLabel(currentDate);
  else if (currentView === 'day') el.textContent = fmtDayLabel(currentDate);
  else el.textContent = fmtDayLabel(currentDate);
}

// ═══════════════════════════════════════════════════
//  VIEW SWITCHING
// ═══════════════════════════════════════════════════
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.view-tab').forEach(el => { if(el.textContent.toLowerCase()===v) el.classList.add('active'); });
  updateDateLabel();
  renderView(v);
}

function navDate(dir) {
  if (currentView === 'month') {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  } else if (currentView === 'grid') {
    currentDate = new Date(currentDate.getTime() + dir * 7 * 86400000);
  } else {
    currentDate = new Date(currentDate.getTime() + dir * 86400000);
  }
  updateDateLabel();
  renderView(currentView);
}

function goToToday() {
  currentDate = new Date(2026, 5, 18);
  updateDateLabel();
  renderView(currentView);
}

function renderView(v) {
  if (v==='day') renderDayView();
  if (v==='month') renderMonthView();
  if (v==='grid') renderGridView();
  if (v==='list') renderListView();
  if (v==='map') renderMapView();
}

// ═══════════════════════════════════════════════════
//  DAY VIEW
// ═══════════════════════════════════════════════════
const DAY_ROOMS = ['Shipwright Board Room','Corporate Hot Desking','Corporate Hot Desking 2',
  '0-19 Office – Desk 1','0-19 Office – Desk 2','0-19 Office – Desk 3',
  '0-19 Office – Desk 4','0-19 Office – Desk 5','0-19 Office – Desk 6'];
const START_HOUR = 7, END_HOUR = 20;

function renderDayView() {
  const grid = document.getElementById('dayGrid');
  grid.style.setProperty('--room-count', DAY_ROOMS.length);
  const dateStr = fmtDate(currentDate);
  const dayBks = getDayBookings(dateStr);

  let html = `<div class="time-gutter-header"></div>`;
  DAY_ROOMS.forEach(r => html += `<div class="day-col-header room-header">${r}</div>`);

  for (let h = START_HOUR; h < END_HOUR; h++) {
    html += `<div class="time-label">${String(h).padStart(2,'0')}:00</div>`;
    DAY_ROOMS.forEach(room => {
      const bksForSlot = dayBks.filter(b => b.room === room);
      let cellBookings = '';
      bksForSlot.forEach(b => {
        const startM = timeToMins(b.start), endM = timeToMins(b.end);
        const slotStartM = h * 60, slotEndM = (h+1) * 60;
        if (startM < slotEndM && endM > slotStartM && startM >= slotStartM && startM < slotEndM) {
          const durationHours = (endM - startM) / 60;
          const topPct = ((startM - slotStartM) / 60) * 100;
          const heightUnits = durationHours * 48;
          cellBookings += `<div class="booking-block" style="top:${topPct}%;height:${heightUnits - 4}px" onclick="editBooking(${b.id})" title="${b.user}: ${b.start}–${b.end}">
            ${b.start}–${b.end}<div class="bk-name">${b.user}</div>
          </div>`;
        }
      });
      html += `<div class="time-slot room-col" onclick="openNewBookingAt('${room}','${String(h).padStart(2,'0')}:00')">${cellBookings}</div>`;
    });
  }
  grid.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  MONTH VIEW
// ═══════════════════════════════════════════════════
function renderMonthView() {
  const cal = document.getElementById('monthCal');
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const today = fmtDate(new Date(2026, 5, 18));
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = dayNames.map(d => `<div class="month-day-header">${d}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  // prev month fill
  for (let i = firstDay-1; i >= 0; i--) {
    html += `<div class="month-cell other-month"><div class="mc-date">${prevDays-i}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayBks = getDayBookings(dateStr);
    const isToday = dateStr === today;
    const dateObj = new Date(year, month, d);
    const isWknd = dateObj.getDay()===0 || dateObj.getDay()===6;
    let evHtml = '';
    const shown = dayBks.slice(0,3);
    shown.forEach(b => { evHtml += `<div class="mc-event" onclick="editBooking(${b.id});event.stopPropagation()">${b.start} ${b.room.substring(0,14)}</div>`; });
    if (dayBks.length > 3) evHtml += `<div class="mc-more">+${dayBks.length-3} more</div>`;
    html += `<div class="month-cell${isToday?' today':''}${isWknd?' other-month':''}" onclick="jumpToDay(${year},${month},${d})">
      <div class="mc-date">${d}</div>${evHtml}
    </div>`;
  }

  // next month fill
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="month-cell other-month"><div class="mc-date">${i}</div></div>`;
  }
  cal.innerHTML = html;
}

function jumpToDay(y, m, d) {
  currentDate = new Date(y, m, d);
  switchView('day');
}

// ═══════════════════════════════════════════════════
//  GRID VIEW (week)
// ═══════════════════════════════════════════════════
function renderGridView() {
  const container = document.getElementById('gridView');
  // Get week start (Mon)
  const dow = currentDate.getDay();
  const monday = new Date(currentDate.getTime() - ((dow===0?6:dow-1)*86400000));
  const days = Array.from({length:7}, (_,i) => new Date(monday.getTime() + i*86400000));
  const todayStr = fmtDate(new Date(2026,5,18));

  let html = `<div class="gv-header"></div>`;
  days.forEach(d => {
    const ds = fmtDate(d);
    const isToday = ds === todayStr;
    html += `<div class="gv-header day-head${isToday?' today-head':''}">
      <div>${fmtWeekday(d)}</div>
      <div style="font-size:18px;font-weight:700">${fmtDayNum(d)}</div>
    </div>`;
  });

  for (let h = START_HOUR; h < END_HOUR; h++) {
    html += `<div class="gv-time">${String(h).padStart(2,'0')}:00</div>`;
    days.forEach(d => {
      const ds = fmtDate(d);
      const bks = getDayBookings(ds);
      let inner = '';
      bks.forEach(b => {
        const sm = timeToMins(b.start), em = timeToMins(b.end);
        const slotS = h*60, slotE = (h+1)*60;
        if (sm < slotE && em > slotS && sm >= slotS && sm < slotE) {
          inner += `<div class="gv-booking" onclick="editBooking(${b.id});event.stopPropagation()">${b.start} ${b.room.substring(0,12)}</div>`;
        }
      });
      html += `<div class="gv-cell" onclick="openNewBookingAt('',minsToTime(${h}*60))">${inner}</div>`;
    });
  }
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  LIST VIEW
// ═══════════════════════════════════════════════════
function renderListView() {
  const container = document.getElementById('listView');
  // Group bookings by date for next 30 days
  const start = new Date(2026, 5, 18);
  const end = new Date(2026, 7, 14);
  const grouped = {};
  bookings.forEach(b => { (grouped[b.date] = grouped[b.date]||[]).push(b); });
  const dates = Object.keys(grouped).sort();

  if (!dates.length) { container.innerHTML = '<div class="empty-state"><div class="es-icon">📅</div>No bookings found.</div>'; return; }

  let html = '';
  dates.forEach(dateStr => {
    const d = new Date(dateStr + 'T00:00:00');
    const label = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
    html += `<div class="list-day-group"><div class="list-day-label">${label}</div>`;
    grouped[dateStr].sort((a,b)=>a.start.localeCompare(b.start)).forEach(bk => {
      const sm = timeToMins(bk.start), em = timeToMins(bk.end);
      const dur = em-sm;
      const h = Math.floor(dur/60), m = dur%60;
      const durStr = h ? (m ? `${h}h ${m}m` : `${h}h`) : `${m}m`;
      const isRecurring = Math.random() > .7;
      html += `<div class="list-row" onclick="editBooking(${bk.id})">
        <div><div class="list-time">${bk.start}–${bk.end}</div><div class="list-duration">(${durStr})${isRecurring?' 🔄':''}</div></div>
        <div class="list-room">${bk.room}</div>
        <div class="list-person">👤 ${bk.user||'User booking'}</div>
        <div><span class="status-pill ${isRecurring?'recurring':'confirmed'}">${isRecurring?'Recurring':'Confirmed'}</span></div>
      </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  MAP VIEW
// ═══════════════════════════════════════════════════
function renderMapView() {
  const mapRoomList = document.getElementById('mapRoomList');
  const mapRooms = [
    'Shipwright Board Room','Senior Management / Exec','Small Meeting Room',
    '0-19 Office – Desk 1','0-19 Office – Desk 2','0-19 Office – Desk 3',
    '0-19 Office – Desk 4','0-19 Office – Desk 5','0-19 Office – Desk 6',
    'SPA Offices – Desk 1','SPA Offices – Desk 2','SPA Offices – Desk 3','SPA Offices – Desk 4',
    'Corporate Hot Desking 1','Corporate Hot Desking 2','Corporate Hot Desking 3','Corporate Hot Desking 4'
  ];
  const todayStr = fmtDate(currentDate);

  // Update hotspot visual state to reflect today's bookings
  document.querySelectorAll('.hotspot').forEach(el => {
    const room = el.getAttribute('data-room');
    const bkCount = getDayBookings(todayStr).filter(b => b.room === room).length;
    el.classList.toggle('taken', bkCount > 0);
  });

  mapRoomList.innerHTML = mapRooms.map(r => {
    const bkCount = getDayBookings(todayStr).filter(b=>b.room===r).length;
    const dot = bkCount > 0 ? '⚪' : '🟢';
    return `<div style="cursor:pointer" onclick="mapRoomClick('${r.replace(/'/g,"\\'")}')"> ${dot} ${r}</div>`;
  }).join('');
}

function mapRoomClick(roomName) {
  selectedMapRoom = roomName;
  const panel = document.getElementById('mapSelectedRoom');
  const nameEl = document.getElementById('mapRoomName');
  const bkEl = document.getElementById('mapRoomBookings');
  panel.style.display = 'block';
  nameEl.textContent = roomName;
  const todayStr = fmtDate(currentDate);
  const bks = getDayBookings(todayStr).filter(b => b.room === roomName);
  if (bks.length) {
    bkEl.innerHTML = bks.map(b => `<div style="margin-bottom:4px">⏰ ${b.start}–${b.end}</div>`).join('');
  } else {
    bkEl.innerHTML = '<div style="color:#4caf50;font-weight:600">✓ Available today</div>';
  }
}

function openNewBookingForRoom() {
  openNewBooking();
  if (selectedMapRoom) document.getElementById('bkRoom').value = selectedMapRoom;
}

// ═══════════════════════════════════════════════════
//  BOOKING MODAL
// ═══════════════════════════════════════════════════
let editingId = null;

function openNewBooking() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Booking';
  document.getElementById('bkRoom').value = '';
  document.getElementById('bkDate').value = fmtDate(currentDate);
  document.getElementById('bkStart').value = '09:00';
  document.getElementById('bkEnd').value = '17:00';
  document.getElementById('bkUser').value = '';
  document.getElementById('bkNotes').value = '';
  document.getElementById('bkRecurring').value = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function openNewBookingAt(room, time) {
  openNewBooking();
  if (room) document.getElementById('bkRoom').value = room;
  if (time) { document.getElementById('bkStart').value = time; }
}

function editBooking(id) {
  const bk = bookings.find(b => b.id===id);
  if (!bk) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Booking';
  document.getElementById('bkRoom').value = bk.room;
  document.getElementById('bkDate').value = bk.date;
  document.getElementById('bkStart').value = bk.start;
  document.getElementById('bkEnd').value = bk.end;
  document.getElementById('bkUser').value = bk.user;
  document.getElementById('bkNotes').value = bk.notes||'';
  document.getElementById('bkRecurring').value = 'none';

  // add delete button
  const footer = document.querySelector('.modal-footer');
  const existing = footer.querySelector('.btn-danger');
  if (!existing) {
    const del = document.createElement('button');
    del.className = 'btn btn-danger'; del.textContent = 'Delete';
    del.onclick = () => deleteBooking(id);
    footer.insertBefore(del, footer.firstChild);
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function deleteBooking(id) {
  bookings = bookings.filter(b => b.id!==id);
  closeModal();
  renderView(currentView);
  showToast('Booking deleted');
}

function saveBooking() {
  const room = document.getElementById('bkRoom').value;
  const date = document.getElementById('bkDate').value;
  const start = document.getElementById('bkStart').value;
  const end = document.getElementById('bkEnd').value;
  const user = document.getElementById('bkUser').value || 'User booking';
  const notes = document.getElementById('bkNotes').value;

  if (!room || !date || !start || !end) { alert('Please fill in room, date and times.'); return; }
  if (timeToMins(end) <= timeToMins(start)) { alert('End time must be after start time.'); return; }

  if (editingId) {
    const bk = bookings.find(b=>b.id===editingId);
    Object.assign(bk, {room,date,start,end,user,notes});
    showToast('Booking updated ✓');
  } else {
    bookings.push({id:nextId++,room,date,start,end,user,notes});
    showToast('Booking confirmed ✓');
  }
  closeModal();
  renderView(currentView);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  const del = document.querySelector('.modal-footer .btn-danger');
  if (del) del.remove();
  editingId = null;
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
switchView('day');
</script>
